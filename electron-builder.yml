appId: com.ccinstaller.app
productName: claudeCode引导
directories:
  output: release
  buildResources: assets

asar: true
asarUnpack: []
compression: maximum

mac:
  target:
    - dmg
    - zip
  artifactName: claudeCode引导-${version}-mac.${ext}
  icon: assets/icon.png

dmg:
  writeUpdateInfo: false

win:
  target:
    - zip
  artifactName: claudeCode引导-${version}-win.${ext}
  icon: assets/icon.png
  sign: null

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  differentialPackage: false

files:
  - dist/**/*.js
  - dist/**/*.html
  - dist/**/*.css
  - assets/**/*
  - package.json
  - "!dist/**/*.test.js"
  - "!dist/**/*.test.d.ts"
  - "!dist/**/*.js.map"
  - "!dist/**/*.d.ts"
